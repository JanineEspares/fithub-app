<body data-page="deactivate">
  <header id="app-header"></header>
  <main class="container py-4 py-lg-5">
    <section class="hero-panel mb-4">
      <div class="hero-text">
        <span class="chip">Fitness E-Commerce</span>
        <h1 class="page-title">Deactivate</h1>
        <p class="page-subtitle">Suspend user accounts safely and show a clear status before removal from access.</p>
      </div>
    </section>
    <section class="card card-surface p-3 p-lg-4">
      <div class="row g-4 align-items-center">
        <div class="col-lg-8">
          <h2 class="section-title mb-2">Deactivate a user</h2>
          <p class="text-muted mb-0">Use this screen for role-based account suspension during admin management.</p>
        </div>
        <div class="col-lg-4 text-lg-end">
          <button class="btn btn-brand btn-lg" type="button" id="deactivate-user-btn">Deactivate Selected User</button>
        </div>
      </div>
      <div class="table-responsive mt-4">
        <table id="deactivate-table" class="table table-hover align-middle w-100">
          <thead>
            <tr><th>ID</th><th>User</th><th>Email</th><th>Status</th><th>Action</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  <footer id="app-footer"></footer>
