<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHub | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body data-page="login">
  <header id="app-header"></header>
  <main class="container py-5">
    <section class="auth-card">
      <span class="chip">Welcome back!</span>
      <h1 class="auth-title mt-3">Sign in to FitHub</h1>
      <p class="auth-helper">Log in to continue shopping for high-quality fitness gear, apparel, supplements, and accessories that help you achieve your goals.</p>
      <form action="/auth/login" method="post" data-auth-form data-redirect="dashboard.html" class="d-grid gap-3">
        <div>
          <label for="login-email" class="form-label">Email</label>
          <input id="login-email" name="email" type="email" class="form-control form-control-lg" required>
        </div>
        <div>
          <label for="login-password" class="form-label">Password</label>
          <input id="login-password" name="password" type="password" class="form-control form-control-lg" required>
        </div>
        <button class="btn btn-brand btn-lg" type="submit">Login</button>
        <p class="small text-center mb-0">No account yet? <a href="register.html">Create one</a></p>
      </form>
    </section>
  </main>
  <footer id="app-footer"></footer>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
