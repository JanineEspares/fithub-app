<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHub | Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/shop.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body data-page="reports">
  <header id="app-header"></header>
  <main class="container py-4 py-lg-5">
    <section class="hero-panel mb-4">
      <div class="hero-text">
        <span class="chip">Fitness E-Commerce</span>
        <h1 class="page-title">Reports</h1>
        <p class="page-subtitle">Generate operational reports for sales, inventory, and customer activity.</p>
      </div>
    </section>
    <section class="card card-surface p-3 p-lg-4 mb-4">
      <div class="row g-3">
        <div class="col-lg-4"><div class="metric-card"><div class="metric-label">Sales</div><div class="metric-value">PHP 120,000</div></div></div>
        <div class="col-lg-4"><div class="metric-card"><div class="metric-label">Orders</div><div class="metric-value">248</div></div></div>
        <div class="col-lg-4"><div class="metric-card"><div class="metric-label">Customers</div><div class="metric-value">93</div></div></div>
      </div>
    </section>
    <section class="card card-surface p-3 p-lg-4">
      <div class="chart-grid">
        <article class="chart-card"><h2 class="section-title">Bar Report</h2><div style="height:250px"><canvas id="reportBarChart"></canvas></div></article>
        <article class="chart-card"><h2 class="section-title">Line Report</h2><div style="height:250px"><canvas id="reportLineChart"></canvas></div></article>
        <article class="chart-card"><h2 class="section-title">Pie Report</h2><div style="height:250px"><canvas id="reportPieChart"></canvas></div></article>
      </div>
    </section>
  </main>
  <footer id="app-footer"></footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/charts.js"></script>
</body>
</html>
