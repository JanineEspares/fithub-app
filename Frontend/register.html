<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHub | Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body data-page="register">
  <header id="app-header"></header>
  <main class="container py-5">
    <section class="auth-card">
      <span class="chip">Create account</span>
      <h1 class="auth-title mt-3">Join FitHub</h1>
      <p class="auth-helper">Register as a customer for shopping, checkout, and order tracking.</p>
      <form action="/auth/register" method="post" data-auth-form data-redirect="login.html" class="d-grid gap-3">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="first-name" class="form-label">First name</label>
            <input id="first-name" name="first_name" type="text" class="form-control form-control-lg" required>
          </div>
          <div class="col-md-6">
            <label for="last-name" class="form-label">Last name</label>
            <input id="last-name" name="last_name" type="text" class="form-control form-control-lg" required>
          </div>
        </div>
        <div>
          <label for="register-email" class="form-label">Email</label>
          <input id="register-email" name="email" type="email" class="form-control form-control-lg" required>
        </div>
        <div>
          <label for="phone-number" class="form-label">Phone Number <span class="text-muted">(Optional)</span></label>
          <input id="phone-number" name="phone_number" type="tel" class="form-control form-control-lg" placeholder="+1 (555) 123-4567">
        </div>
        <div>
          <label for="address" class="form-label">Address <span class="text-muted">(Optional)</span></label>
          <textarea id="address" name="address" class="form-control form-control-lg" rows="2" placeholder="123 Main St, City, State 12345"></textarea>
        </div>
        <div>
          <label for="register-password" class="form-label">Password</label>
          <input id="register-password" name="password" type="password" class="form-control form-control-lg" required>
          <small class="text-muted">Minimum 8 characters</small>
        </div>
        <div>
          <label for="confirm-password" class="form-label">Confirm password</label>
          <input id="confirm-password" name="confirm_password" type="password" class="form-control form-control-lg" required>
          <div class="validation-error" data-password-match-error></div>
        </div>
        <button class="btn btn-brand btn-lg" type="submit">Create Account</button>
        <p class="small text-center mb-0">Already have an account? <a href="login.html">Login here</a></p>
      </form>
    </section>
  </main>
  <footer id="app-footer"></footer>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
  <script>
    window.FitHubValidation.bindPasswordMatch('form[data-auth-form]', '#register-password', '#confirm-password');
  </script>
</body>
</html>
