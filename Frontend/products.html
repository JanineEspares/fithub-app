<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHub | Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/shop.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body data-page="products">
  <header id="app-header"></header>
  <main class="container py-4 py-lg-5">
    <section class="hero-panel mb-4">
      <div class="hero-text">
        <span class="chip">Fitness E-Commerce</span>
        <h1 class="page-title">Products</h1>
        <p class="page-subtitle">Create, edit, and remove products while uploading multiple images for each item.</p>
      </div>
    </section>
    <section class="card card-surface p-3 p-lg-4 mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-lg-8">
          <label class="form-label fw-bold" for="product-search">Search products</label>
          <input id="product-search" class="form-control form-control-lg" type="search" placeholder="Search by name, brand, or category...">
        </div>
        <div class="col-lg-4 text-lg-end">
          <button class="btn btn-brand btn-lg" type="button">Add Product</button>
        </div>
      </div>
    </section>
    <section class="card card-surface p-3 p-lg-4">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
        <h2 class="section-title m-0">Inventory Table</h2>
        <span class="text-muted small">Admin CRUD, no DataTables pagination</span>
      </div>
      <div class="table-responsive mt-3">
        <table id="products-table" class="table table-hover align-middle w-100">
          <thead>
            <tr><th>ID</th><th>Name</th><th>Price</th><th>Status</th><th>Action</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  <footer id="app-footer"></footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
