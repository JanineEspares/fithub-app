<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHub | Item</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/shop.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body data-page="item">
  <header id="app-header"></header>
  <main class="container py-4 py-lg-5">
    <section class="hero-panel mb-4">
      <div class="hero-text">
        <span class="chip">Fitness E-Commerce</span>
        <h1 class="page-title">Item</h1>
        <p class="page-subtitle">View product photos, variant details, pricing, and add the item to cart quickly.</p>
      </div>
    </section>
    <section class="card card-surface p-3 p-lg-4">
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card card-surface p-3 h-100">
            <div class="ratio ratio-1x1 rounded-4 overflow-hidden bg-light">
              <img id="item-image" src="assets/images/placeholder-product.jpg" alt="Product preview" class="w-100 h-100 object-fit-cover">
            </div>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
            <span class="chip">Featured item</span>
            <span class="text-muted small">Product ID: <span id="item-id">-</span></span>
          </div>
          <h2 class="section-title mb-2" id="item-name">Pre-workout Energy Blend</h2>
          <p class="text-muted mb-3" id="item-description">A clean item detail layout for product browsing and quick add-to-cart actions.</p>
          <div class="d-flex flex-wrap align-items-center gap-3 mb-3">
            <div class="fs-3 fw-bold text-success" id="item-price">$0.00</div>
            <div class="badge text-bg-light border" id="item-status">In stock</div>
          </div>
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label" for="item-qty">Quantity</label>
              <input id="item-qty" type="number" min="1" value="1" class="form-control form-control-lg">
            </div>
            <div class="col-md-8 d-flex gap-2">
              <button class="btn btn-brand btn-lg flex-grow-1" type="button" id="add-to-cart-btn">Add to Cart</button>
              <button class="btn btn-outline-brand btn-lg" type="button">Wishlist</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer id="app-footer"></footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/item.js"></script>
</body>
</html>
