<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHub | Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/shop.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body data-page="cart">
  <header id="app-header"></header>
  <main class="container py-4 py-lg-5">
    <section class="hero-panel mb-4">
      <div class="hero-text">
        <span class="chip">Fitness E-Commerce</span>
        <h1 class="page-title">Cart</h1>
        <p class="page-subtitle">Review selected items, adjust quantities, and proceed to checkout when ready.</p>
      </div>
    </section>
    <section class="card card-surface p-3 p-lg-4">
      <div class="row g-4">
        <div class="col-lg-8">
          <h2 class="section-title mb-3">Cart Items</h2>
          <div id="cart-items" class="d-grid gap-3"></div>
          <div id="cart-empty" class="empty-state mt-3">
            <h3>Your cart is empty</h3>
            <p>Add products from the shop to start building your order.</p>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card card-surface p-3 sticky-lg-top" style="top: 90px;">
            <h3 class="section-title">Order summary</h3>
            <div class="d-flex justify-content-between my-3"><span>Subtotal</span><strong id="cart-subtotal">$0.00</strong></div>
            <div class="d-flex justify-content-between mb-3"><span>Shipping</span><strong id="cart-shipping">$0.00</strong></div>
            <hr>
            <div class="d-flex justify-content-between mb-3 fs-5"><span>Total</span><strong id="cart-total">$0.00</strong></div>
            <a href="checkout.html" class="btn btn-brand btn-lg w-100">Proceed to Checkout</a>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer id="app-footer"></footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
