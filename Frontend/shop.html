<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHub | Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/shop.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body data-page="shop">
  <header id="app-header"></header>
  <main class="container-fluid py-4 py-lg-5">
    <!-- Hero Section -->
    <section class="hero-panel mb-4 container">
      <div class="hero-text">
        <span class="chip">Shop catalog</span>
        <h1 class="page-title">Elevate Your Fitness Journey</h1>
        <p class="page-subtitle">Discover our curated collection of premium fitness products designed to help you achieve your health goals.</p>
      </div>
    </section>

    <!-- Main Shop Layout -->
    <div class="container">
      <div class="row g-4">
        <!-- Sidebar Filters -->
        <div class="col-lg-3">
          <div class="card card-surface p-3 p-lg-4 sticky-top" style="top: 20px;">
            <!-- Search -->
            <div class="mb-4">
              <label class="form-label fw-bold" for="shop-search">Search</label>
              <input id="shop-search" class="form-control" type="search" placeholder="Search products...">
            </div>

            <!-- Categories Filter -->
            <div class="mb-4">
              <h6 class="fw-bold mb-3">Categories</h6>
              <div id="filter-categories" class="list-group list-group-flush">
                <div class="spinner-border spinner-border-sm" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
              </div>
              <button id="clear-category-filter" class="btn btn-sm btn-link p-0 mt-2 d-none">Clear filter</button>
            </div>

            <!-- Price Range Filter -->
            <div class="mb-4">
              <h6 class="fw-bold mb-3">Price Range</h6>
              <div class="d-flex gap-2 mb-3">
                <input id="min-price" class="form-control form-control-sm" type="number" placeholder="Min" min="0">
                <input id="max-price" class="form-control form-control-sm" type="number" placeholder="Max" min="0">
              </div>
              <button id="apply-price-filter" class="btn btn-sm btn-outline-primary w-100">Apply</button>
              <button id="clear-price-filter" class="btn btn-sm btn-link p-0 mt-2 d-none">Clear filter</button>
            </div>

            <!-- Sort Options -->
            <div class="mb-4">
              <h6 class="fw-bold mb-3">Sort By</h6>
              <select id="sort-select" class="form-select form-select-sm">
                <option value="name">Name (A-Z)</option>
                <option value="price">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="newest">Newest First</option>
              </select>
            </div>

            <!-- Clear All Filters -->
            <button id="clear-all-filters" class="btn btn-sm btn-outline-secondary w-100">Clear All Filters</button>
          </div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-9">
          <!-- Results Info & Layout Toggle -->
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h5 class="m-0">
                Products
                <small class="text-muted">(<span id="total-products">0</span> results)</small>
              </h5>
            </div>
            <div class="d-flex gap-2">
              <button id="layout-grid" class="btn btn-sm btn-outline-primary active" title="Grid view">
                <i class="fas fa-grip"></i>
              </button>
              <button id="layout-list" class="btn btn-sm btn-outline-primary" title="List view">
                <i class="fas fa-list"></i>
              </button>
            </div>
          </div>

          <!-- Products Grid -->
          <div id="shop-products-grid" class="row g-3"></div>

          <!-- Loading Spinner -->
          <div id="loading-spinner" class="text-center py-5 d-none">
            <div class="spinner-border" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>

          <!-- No Results -->
          <div id="no-results" class="text-center py-5 d-none">
            <i class="fas fa-search fa-3x text-muted mb-3"></i>
            <p class="text-muted">No products found. Try adjusting your filters.</p>
          </div>

          <!-- Pagination -->
          <nav id="pagination-nav" class="mt-4 d-none">
            <ul class="pagination justify-content-center" id="pagination-controls"></ul>
          </nav>
        </div>
      </div>
    </div>
  </main>
  <footer id="app-footer"></footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
