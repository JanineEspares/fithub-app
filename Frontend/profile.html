<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHub | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body data-page="profile">
  <header id="app-header"></header>
  <main class="container py-5">
    <section class="auth-card">
      <span class="chip">Account</span>
      <h1 class="auth-title mt-3">Your profile</h1>
      <p class="auth-helper">View account details and keep your shopping profile up to date.</p>
      <div class="row g-3">
        <div class="col-md-6"><div class="card card-surface p-3"><strong>First name</strong><div id="profile-first-name">-</div></div></div>
        <div class="col-md-6"><div class="card card-surface p-3"><strong>Last name</strong><div id="profile-last-name">-</div></div></div>
        <div class="col-12"><div class="card card-surface p-3"><strong>Email</strong><div id="profile-email">-</div></div></div>
      </div>
    </section>
  </main>
  <footer id="app-footer"></footer>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    $(function () {
      const user = window.FitHubUtils.getUser();
      if (user) {
        $('#profile-first-name').text(user.first_name || '-');
        $('#profile-last-name').text(user.last_name || '-');
        $('#profile-email').text(user.email || '-');
      }
    });
  </script>
</body>
</html>
