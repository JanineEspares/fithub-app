<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHub | My Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="profile">
  <header id="app-header"></header>

  <main class="container my-5">
    <!-- Page Header -->
    <div class="d-flex align-items-center gap-3 mb-5">
      <div>
        <h1 class="mb-2">My Profile</h1>
        <p class="text-muted mb-0">Manage your account information and preferences</p>
      </div>
    </div>

    <div class="row gap-4">
      <!-- Sidebar Navigation -->
      <aside class="col-lg-3">
        <div class="card">
          <div class="card-body">
            <nav class="nav flex-column gap-2" id="profile-nav">
              <a href="#personal-info" class="nav-link active" data-bs-toggle="tab" role="tab">
                <i class="fas fa-user me-2"></i> Personal Information
              </a>
              <a href="#contact-info" class="nav-link" data-bs-toggle="tab" role="tab">
                <i class="fas fa-phone me-2"></i> Contact Information
              </a>
              <a href="#security" class="nav-link" data-bs-toggle="tab" role="tab">
                <i class="fas fa-lock me-2"></i> Security
              </a>
              <a href="#orders" class="nav-link" data-bs-toggle="tab" role="tab">
                <i class="fas fa-box me-2"></i> My Orders
              </a>
            </nav>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="col-lg-9">
        <div class="tab-content">
          <!-- Personal Information Tab -->
          <div class="tab-pane fade show active" id="personal-info">
            <div class="card">
              <div class="card-header bg-light">
                <h5 class="mb-0">Personal Information</h5>
              </div>
              <div class="card-body">
                <form id="personal-info-form">
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label for="first-name" class="form-label">First Name</label>
                      <input type="text" class="form-control" id="first-name" name="first_name" required>
                    </div>
                    <div class="col-md-6">
                      <label for="last-name" class="form-label">Last Name</label>
                      <input type="text" class="form-control" id="last-name" name="last_name" required>
                    </div>
                  </div>
                  <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" disabled>
                    <small class="text-muted">Email cannot be changed</small>
                  </div>
                  <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i> Save Changes
                  </button>
                </form>
              </div>
            </div>
          </div>

          <!-- Contact Information Tab -->
          <div class="tab-pane fade" id="contact-info">
            <div class="card">
              <div class="card-header bg-light">
                <h5 class="mb-0">Contact Information</h5>
              </div>
              <div class="card-body">
                <form id="contact-info-form">
                  <div class="mb-3">
                    <label for="phone-number" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone-number" name="phone_number" placeholder="+1 (555) 123-4567">
                  </div>
                  <div class="mb-3">
                    <label for="address" class="form-label">Address</label>
                    <textarea class="form-control" id="address" name="address" rows="3" placeholder="123 Main St, City, State 12345"></textarea>
                  </div>
                  <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i> Save Changes
                  </button>
                </form>
              </div>
            </div>
          </div>

          <!-- Security Tab -->
          <div class="tab-pane fade" id="security">
            <div class="card">
              <div class="card-header bg-light">
                <h5 class="mb-0">Change Password</h5>
              </div>
              <div class="card-body">
                <form id="change-password-form">
                  <div class="mb-3">
                    <label for="current-password" class="form-label">Current Password</label>
                    <input type="password" class="form-control" id="current-password" name="current_password" required>
                  </div>
                  <div class="mb-3">
                    <label for="new-password" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="new-password" name="new_password" required>
                    <small class="text-muted">Minimum 8 characters</small>
                  </div>
                  <div class="mb-3">
                    <label for="confirm-new-password" class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirm-new-password" name="confirm_new_password" required>
                  </div>
                  <button type="submit" class="btn btn-primary">
                    <i class="fas fa-lock me-2"></i> Change Password
                  </button>
                </form>
              </div>
            </div>
          </div>

          <!-- Orders Tab -->
          <div class="tab-pane fade" id="orders">
            <div class="card">
              <div class="card-header bg-light">
                <h5 class="mb-0">My Orders</h5>
              </div>
              <div class="card-body">
                <p class="text-muted" id="loading-orders">
                  <i class="fas fa-spinner fa-spin me-2"></i> Loading your orders...
                </p>
                <div id="orders-list"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer id="app-footer"></footer>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
