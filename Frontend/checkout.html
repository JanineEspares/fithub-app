<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHub | Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/shop.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body data-page="checkout">
  <header id="app-header"></header>
  <main class="container py-4 py-lg-5">
    <section class="hero-panel mb-4">
      <div class="hero-text">
        <span class="chip">Fitness E-Commerce</span>
        <h1 class="page-title">Checkout</h1>
        <p class="page-subtitle">Enter shipping details, confirm payment method, and finalize your order.</p>
      </div>
    </section>
    <section class="card card-surface p-3 p-lg-4">
      <div class="row g-4">
        <div class="col-lg-7">
          <h2 class="section-title mb-3">Shipping and payment</h2>
          <form class="d-grid gap-3" id="checkout-form">
            <div class="row g-3">
              <div class="col-md-6"><label class="form-label">Full name</label><input class="form-control form-control-lg" name="recipient_name" type="text" required></div>
              <div class="col-md-6"><label class="form-label">Contact number</label><input class="form-control form-control-lg" name="contact_number" type="tel" required></div>
            </div>
            <div><label class="form-label">Address</label><input class="form-control form-control-lg" name="address_line" type="text" required></div>
            <div class="row g-3">
              <div class="col-md-4"><label class="form-label">City</label><input class="form-control form-control-lg" name="city" type="text" required></div>
              <div class="col-md-4"><label class="form-label">Province</label><input class="form-control form-control-lg" name="province" type="text" required></div>
              <div class="col-md-4"><label class="form-label">Postal code</label><input class="form-control form-control-lg" name="postal_code" type="text" required></div>
            </div>
            <div>
              <label class="form-label">Payment method</label>
              <select class="form-select form-select-lg" name="payment_method">
                <option value="cod">Cash on delivery</option>
                <option value="gcash">GCash</option>
                <option value="maya">Maya</option>
                <option value="card">Card</option>
              </select>
            </div>
            <button class="btn btn-brand btn-lg" type="submit">Place order</button>
          </form>
        </div>
        <div class="col-lg-5">
          <div class="card card-surface p-3">
            <h3 class="section-title">Order summary</h3>
            <div id="checkout-summary" class="d-grid gap-2 mt-3"></div>
            <hr>
            <div class="d-flex justify-content-between fs-5"><span>Total</span><strong>$0.00</strong></div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer id="app-footer"></footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
